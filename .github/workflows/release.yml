name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release-tag:
        description: Existing git tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs['release-tag'] || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile

      - name: Verify release tag exists
        shell: bash
        run: git rev-parse --verify "refs/tags/${RELEASE_TAG}"

      - name: Derive floating tags
        id: semver
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tag must match v<major>.<minor>.<patch>: $RELEASE_TAG" >&2
            exit 1
          fi

          echo "major=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "minor=v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build CLI bundle
        run: bun run build

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p release-artifacts
          set -- action.yml README.md bin dist docs scripts
          for license_file in LICENSE LICENSE.md LICENSE.txt; do
            if [ -e "$license_file" ]; then
              set -- "$@" "$license_file"
            fi
          done
          tar -czf "release-artifacts/yamabiko-lite-${RELEASE_TAG}.tar.gz" "$@"

      - name: Update floating action tags
        shell: bash
        run: |
          git tag -f "${{ steps.semver.outputs.major }}" "$RELEASE_TAG"
          git tag -f "${{ steps.semver.outputs.minor }}" "$RELEASE_TAG"
          git push origin "refs/tags/${{ steps.semver.outputs.major }}" --force
          git push origin "refs/tags/${{ steps.semver.outputs.minor }}" --force

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${RELEASE_TAG}" \
            "release-artifacts/yamabiko-lite-${RELEASE_TAG}.tar.gz" \
            --verify-tag \
            --generate-notes \
            --latest
