name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Lint (Biome)
        run: bun run format:check
      - name: Lint (ESLint)
        run: bun run lint
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
      - name: Dead code
        run: bun run deadcode
